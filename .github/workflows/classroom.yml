---
name: Zestaw 1 - Testy
on:
  - push
  - workflow_dispatch

jobs:
  test:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "Zainstaluj wymagane pakiety i g++ 14.2"
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 140 --slave /usr/bin/g++ g++ /usr/bin/g++-14
          sudo update-alternatives --set gcc /usr/bin/gcc-14
          g++ --version # Sprawdzenie wersji

      - name: "ZADANIE1 - Build and Test"
        id: zadanie1
        continue-on-error: true
        run: |
          cd ZADANIE1 && mkdir -p build && cd build && cmake .. && make && ctest --output-on-failure

      - name: "ZADANIE2 - Build and Test"
        id: zadanie2
        continue-on-error: true
        run: |
          cd ZADANIE2 && mkdir -p build && cd build && cmake .. && make && ctest --output-on-failure

      - name: "ZADANIE3 - Build and Test"
        id: zadanie3
        continue-on-error: true
        run: |
          cd ZADANIE3 && mkdir -p build && cd build && cmake .. && make && ctest --output-on-failure

      - name: "ZADANIE4 - Build and Test"
        id: zadanie4
        continue-on-error: true
        run: |
          cd ZADANIE4 && mkdir -p build && cd build && cmake .. && make && ctest --output-on-failure

      - name: "ZADANIE5 - Build and Test"
        id: zadanie5
        continue-on-error: true
        run: |
          cd ZADANIE5 && mkdir -p build && cd build && cmake .. && make && ctest --output-on-failure

      - name: Grading
        uses: education/autograding@v1
        with:
          path: './.github/classroom/autograding.json'

env:
  CLASSROOM_TOKEN: ${{ github.token }}
